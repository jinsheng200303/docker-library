name: Sync PHP Files
on:
  push:
    branches:
      - dev  
    paths:
      - 'apps/php/src/apt_install.sh'
      - 'apps/php/src/cmd.sh'
      - 'apps/php/src/extensions.ini'
      - 'apps/php/src/php_extra.ini'
      - 'apps/php/src/php_install.sh'
jobs:
  sync-php-files:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source code
      uses: actions/checkout@v2
      with:
        ref: dev

    - name: Sync files to phpfpmapache/src
      run: |
        root_dir=$(pwd)
        source_files_dir="$root_dir/apps/php/src"
        destination_dir="$root_dir/apps/phpfpmapache/src"
        changed_files=$(echo "git diff --name-only HEAD^ HEAD -- 'apps/php/*'" | tr ',' '\n')
        for file in apt_install.sh cmd.sh extensions.ini php_extra.ini php_install.sh; do
          if echo "$changed_files" | grep -q "$file"; then
            cp -f "$source_files_dir/$file" "$destination_dir"
            cd $destination_dir
            git add.
            git commit -m "Sync changes from apps/php/src to apps/phpfpmapache/src for $file" || true
            git push origin dev
            cd -
          fi
        done

    - name: Sync files to phpfpmnginx/src
      run: |
        root_dir=$(pwd)
        source_files_dir="$root_dir/apps/php/src"
        destination_dir="$root_dir/apps/phpfpmnginx/src"
        changed_files=$(echo ${{ github.event.changed_files }} | tr ',' '\n')
        for file in apt_install.sh cmd.sh extensions.ini php_extra.ini php_install.sh; do
          if echo "$changed_files" | grep -q "$file"; then
            cp -f "$source_files_dir/$file" "$destination_dir"
            cd $destination_dir
            git add.
            git commit -m "Sync changes from apps/php/src to apps/phpfpmnginx/src for $file" || true
            git push origin dev
            cd -
          fi
        done